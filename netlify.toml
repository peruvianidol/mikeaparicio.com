[dev]
  framework = "#custom"
  command = "npx @11ty/eleventy --serve --port 8080"
  targetPort = 8080

[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

[functions]
  directory = "./netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/work/sketches/cash-confessional/"
  to = "/comedy/cash-confessional/"
  status = 301

[[redirects]]
  from = "/work/sketches/color-me-badd/"
  to = "/comedy/color-me-badd/"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"