<!-- _includes/letterboxd-widget.html -->
<!-- To show more films, change the limit variable in the script below -->

<section data-grid-area="watching">
  <h2 class="ma-eyebrow-sm ma-stack ma-flex" style="--flex-gap: 4px; --flex-align: start">
    {% icon "film", "ma-icon" %}
    <span>Watching</span>
  </h2>
  <ul id="lw-list" role="list"></ul>
</section>

<script>
(function () {
  const list = document.getElementById('lw-list');
  const limit = 3;

  function renderFilm(film) {
    const li = document.createElement('li');
    li.className = "ma-flex",
    li.innerHTML = `
      <img src="${film.posterUrl}" alt="${film.title} poster" loading="lazy" width="60" height="90">
      <div class="ma-flow" style="--flow-size: 4px">
        <p class="ma-text-sm"><a href="${film.reviewUrl}" target="_blank" rel="noopener">${film.title}</a></p><p class="ma-text-xs ma-text-subdued ma-flex" style="--flex-gap: 4px">(${film.year}) ${film.rewatch ? '{% icon "rotate", "ma-icon-12" %}' : ''}</p>
        ${film.ratingValue ? `<div class="ma-rating" style="--height: 16px"><meter min="0" max="5" value="${film.ratingValue}">${film.ratingValue} out of 5 stars</meter></div>` : '<p>No rating</p>'}
      </div>`;

    return li;
  }

  function renderError(msg) {
    const li = document.createElement('li');
    li.className = 'lw__item';
    li.innerHTML = `<span class="lw__error">${msg}</span>`;
    return li;
  }

  fetch(`/api/letterboxd-status?limit=${limit}`)
    .then((r) => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(({ films }) => {
      list.innerHTML = '';

      if (!films.length) {
        list.appendChild(renderError('No recent films found.'));
        return;
      }

      films.forEach((f) => list.appendChild(renderFilm(f)));
    })
    .catch((err) => {
      list.innerHTML = '';
      list.appendChild(renderError('Could not load film status.'));
      console.error('[letterboxd-widget]', err);
    });
}());
</script>
